<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Unifly Airline</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Unifly</span>
                <span class="logo-sub">Airline</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="flights.html">Flights</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-buttons">
                <a href="login.html" class="btn-login">Login</a>
                <a href="register.html" class="btn-register">Register</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <p class="auth-sub">Login to your Unifly account</p>

            <div class="auth-field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="auth-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button class="btn-auth" onclick="loginUser()">Login</button>

            <div class="auth-switch">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Unifly Airline. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
