<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Unifly Airline</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Unifly</span>
                <span class="logo-sub">Airline</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="flights.html">Flights</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-buttons">
                <a href="login.html" class="btn-login">Login</a>
                <a href="register.html" class="btn-register">Register</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p class="auth-sub">Join Unifly and start earning miles</p>

            <div class="auth-field">
                <label>First Name</label>
                <input type="text" id="first_name" placeholder="Enter your first name">
            </div>

            <div class="auth-field">
                <label>Last Name</label>
                <input type="text" id="last_name" placeholder="Enter your last name">
            </div>

            <div class="auth-field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="auth-field">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="e.g. 03001234567">
            </div>

            <div class="auth-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <div class="auth-field">
                <label>Confirm Password</label>
                <input type="password" id="confirm_password" placeholder="Confirm your password">
            </div>

            <button class="btn-auth" onclick="registerUser()">Create Account</button>

            <div class="auth-switch">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Unifly Airline. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
